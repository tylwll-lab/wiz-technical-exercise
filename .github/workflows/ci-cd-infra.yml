name: Wiz Infra CI/CD Pipeline
on: # triggers for the workflow
  workflow_dispatch: # github ui button
  push:
    branches: ["main"]
    paths:
      - "terraform/**"
      - "k8s/**"
      - ".github/workflows/**"
jobs:
  terraform-creation:
    name: Terraform Plan and Apply # display name in github ui
    runs-on: ubuntu-latest # runner
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3.1.2 # downloads and installs terraform onto the vm
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4.0.2 # sets AWS credentials as environment variables on the vm
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Run Checkov IaC Security Scan
        uses: bridgecrewio/checkov-action@v12 # scans terraform files for misconfigurations before deploying
        with:
          directory: terraform/
          soft_fail: true # pipeline continues even if checkov finds issues, needed for intentional misconfigs or we get stuck
      - name: Create s3 bucket if it does not exist
        run: |
          # s3api is low level bucket commands
          # head-bucket is an api-call that checks if the bucket exists and if we have permissions to access it
          # specifies the bucket, then 2>/dev/null to throw any errors away silently
          aws s3api head-bucket --bucket wiz-state-backups-tyler 2>/dev/null || \
          aws s3 mb s3://wiz-state-backups-tyler --region us-east-1
      - name: Terraform Init
        working-directory: terraform
        run: terraform init -upgrade -reconfigure # downloads providers and modules defined in main.tf # added reconfigure due to ci/cd testing (backend/tfstate file)
      - name: Terraform Validate and Format
        working-directory: terraform
        run: |
          terraform fmt -recursive # reformats .tf files to hashicorp standard style
          terraform validate # checks for syntax errors
      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan # dry run
      - name: terraform apply eks/vpc to get kubeconfig for helm
        working-directory: terraform
        run: terraform apply -auto-approve -target=module.eks -target=module.vpc # builds cluster first so kubeconfig can be updated before helm runs
      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region us-east-1 --name wiz-cluster # configures kubectl to talk to our EKS cluster before helm install
      - name: Terraform Apply - full
        working-directory: terraform
        run: terraform apply -auto-approve
      - name: Apply Kubernetes manifests
        run: kubectl apply -f k8s/ # applies all yaml files in the k8s folder
