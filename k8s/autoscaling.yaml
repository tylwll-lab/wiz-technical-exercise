apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: wiz-scaler
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: wiz-app # targets the wiz-app deployment
  minReplicas: 2 # always keep at least 2 pods for availability
  maxReplicas: 5 # scale up to 5 pods under high load
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50 # scale up when average cpu across pods exceeds 50%