#service account that the pod runs with / identity the pod runs as
apiVersion: v1
kind: ServiceAccount
metadata:
  name: wiz-service-account
  namespace: default
---
#ClusterRoleBinding gives the service account full admin rights to the cluster. BAD!
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: wiz-cluster-admin-binding
subjects:
  -  kind: ServiceAccount
     name: wiz-service-account
     namespace: default
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io


